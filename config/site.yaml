# CARMA Box Site Configuration
# Site: Sanduddsvagen 60, Sollentuna
# Version: 2.0

site:
  id: "sanduddsvagen-60"
  name: "Sanduddsvagen 60"
  timezone: "Europe/Stockholm"
  latitude: 59.427
  longitude: 18.005
  altitude_m: 30

# Home Assistant connection
homeassistant:
  url: "http://192.168.5.22:8123"
  token_env: "CARMA_HA_TOKEN"
  verify_ssl: false
  timeout_s: 10
  retry_count: 3
  retry_delay_s: 2

# Grid configuration
grid:
  main_fuse_a: 25
  main_fuse_phases: 3
  voltage_v: 230
  max_import_kw: 17.25

  # Ellevio peak shaving
  ellevio:
    cost_per_kw_month: 81.25
    top_n: 3
    tak_kw: 3.0
    night_weight: 0.5
    day_weight: 1.0
    night_start_hour: 22
    night_end_hour: 6
    margin: 0.85
    emergency_factor: 1.10
    entity_weighted_avg: "sensor.ellevio_viktad_timmedel_pagaende"
    entity_current_peak: "sensor.ellevio_manadens_topp_1"
    entity_dynamic_tak: "sensor.ellevio_dynamiskt_tak"

# Battery configuration
batteries:
  - id: "kontor"
    name: "Kontor"
    type: "goodwe_et"
    cap_kwh: 15.0
    min_soc_pct: 15.0
    min_soc_cold_pct: 20.0
    cold_temp_c: 4.0
    cold_lock_temp_c: 0.0
    max_discharge_kw: 5.0
    max_charge_kw: 5.0
    efficiency: 0.90
    ct_placement: "local_load"
    goodwe_device_id: "696f2a85fed59b45f2ced7fc2663984a"

    goodwe:
      host: "192.168.1.10"
      port: 8899
      comm_addr: 247

    entities:
      soc: "sensor.goodwe_battery_state_of_charge_kontor"
      power: "sensor.goodwe_battery_power_kontor"
      cell_temp: "sensor.goodwe_battery_temperature_kontor"
      pv_power: "sensor.pv_power"
      grid_power: "sensor.house_grid_power"
      load_power: "sensor.back_up_load"
      ems_mode: "select.goodwe_kontor_ems_mode"
      ems_power_limit: "number.goodwe_kontor_ems_power_limit"
      fast_charging: "switch.goodwe_fast_charging_switch_kontor"
      fast_charging_power: "number.goodwe_fast_charging_power_kontor"
      export_limit: "number.goodwe_grid_export_limit_kontor"
      soh: "sensor.battery_state_of_health"

  - id: "forrad"
    name: "Forrad"
    type: "goodwe_et"
    is_outdoor: true
    cap_kwh: 5.0
    min_soc_pct: 15.0
    min_soc_cold_pct: 20.0
    cold_temp_c: 4.0
    cold_lock_temp_c: 0.0
    max_discharge_kw: 5.0
    max_charge_kw: 5.0
    efficiency: 0.90
    ct_placement: "house_grid"
    goodwe_device_id: "e087f4789d3713e9b18f1ff27d4e7cb9"

    goodwe:
      host: "192.168.1.11"
      port: 8899
      comm_addr: 247

    entities:
      soc: "sensor.goodwe_battery_state_of_charge_forrad"
      power: "sensor.goodwe_battery_power_forrad"
      cell_temp: "sensor.goodwe_battery_temperature_forrad"
      pv_power: "sensor.pv_power_2"
      grid_power: "sensor.house_grid_power"
      load_power: "sensor.back_up_load_2"
      ems_mode: "select.goodwe_forrad_ems_mode"
      ems_power_limit: "number.goodwe_forrad_ems_power_limit"
      fast_charging: "switch.goodwe_fast_charging_switch_forrad"
      fast_charging_power: "number.goodwe_fast_charging_power_forrad"
      export_limit: "number.goodwe_grid_export_limit_forrad"
      soh: "sensor.battery_state_of_health_2"

# EV Charger configuration
ev_charger:
  id: "ev_main"
  name: "Easee Home"
  type: "easee"
  charger_id: "EH128405"
  # User directive 2026-04-18 22:00: cap at 6 A overnight because the
  # car SoC is already >90 % and the BMS is pulsing in CV-taper. A fixed
  # 6 A trickle is lugnt/quiet, avoids oscillation, and leaves battery
  # capacity for the morning peak. Revert to 10 when SoC is lower.
  max_amps: 6
  min_amps: 6
  phases: 3
  voltage_v: 230

  ramp:
    start_amps: 6
    step_amps: 1
    step_interval_s: 300
    steps: [6]
    cooldown_after_start_s: 120
    cooldown_after_stop_s: 180
    emergency_cut_amps: 6

  easee:
    smart_charging: false
    waiting_in_fully_fix_delay_s: 180
    max_charger_current_floor: 10

  entities:
    status: "sensor.easee_home_12840_status"
    power: "sensor.easee_home_12840_power"
    current: "sensor.easee_home_12840_current"
    enabled: "switch.easee_home_12840_is_enabled"
    dynamic_charger_limit: "sensor.easee_home_12840_dynamic_charger_limit"
    max_charger_limit: "sensor.easee_home_12840_max_charger_limit"
    reason_for_no_current: "sensor.easee_home_12840_reason_for_no_current"
    override_schedule: "button.easee_home_12840_override_schedule"

# EV configuration
ev:
  id: "xpeng_g9"
  name: "XPENG G9"
  battery_kwh: 92.0
  efficiency: 0.92
  daily_target_soc_pct: 100.0
  weekly_full_charge_days: 7
  max_soc_jump_pct: 20.0

  entities:
    soc: "sensor.bil_batteri_soc"

# Dispatchable consumers (surplus chain)
consumers:
  - id: "miner"
    name: "Goldshell SC Box II"
    # PLAT-1700: miners MUST use goldshell_miner adapter (not Shelly).
    # Shelly relay power-cycling damages ASIC. Adapter is a stub today —
    # reads power, ignores dispatch writes — until /mcb/newconfig is wired.
    adapter: "goldshell_miner"
    type: "on_off"
    role: "cold_heater"
    # PLAT-1715: user rule — miner is LAST dispatchable (cold_heater).
    # Priority cascade: bat → EV → VP kontor → VP pool → pool_heater → miner.
    # Lower number = higher priority (starts first with surplus).
    priority: 99
    priority_shed: 1
    power_w: 400
    min_w: 400
    max_w: 400
    # entity_switch deliberately omitted — no relay fallback.
    entity_power: "sensor.appliance_total_effekt"
    start_export_w: 200
    stop_import_w: 500

  - id: "vp_kontor"
    name: "VP Kontor"
    type: "on_off"
    priority: 3
    priority_shed: 2
    power_w: 1500
    min_w: 1500
    max_w: 2000
    entity_switch: "switch.shellypro1pm_30c6f78289b8_switch_0"
    entity_power: "sensor.carma_effekt_vp_kontor"

  - id: "vp_pool"
    name: "VP Pool"
    type: "on_off"
    priority: 4
    priority_shed: 3
    power_w: 2000
    min_w: 2000
    max_w: 3000
    entity_switch: "switch.pool_vp_on_off"
    entity_power: "sensor.carma_effekt_vp_pool"
    requires_active: "pump_pool"

  - id: "pool_heater"
    name: "Pool Heater"
    # PLAT-1698: Shelly 1PM controlling the pool heater has been offline
    # since 2026-04-12 → no real relay to drive. Marked dispatchable=false
    # so v2 never attempts to turn_on/off a dead switch (and never spams
    # the input_boolean proxy). Re-enable once the Shelly is replaced.
    adapter: "read_only"
    dispatchable: false
    type: "on_off"
    priority: 5
    priority_shed: 4
    power_w: 3000
    min_w: 3000
    max_w: 3000
    entity_power: "sensor.poolvarmare_shelly_1pm_power"
    requires_active: "pump_pool"

# Surplus chain configuration
surplus:
  start_delay_s: 60
  stop_delay_s: 180
  bump_delay_s: 60
  min_surplus_w: 50
  max_switches_per_window: 2
  switch_window_min: 30
  start_threshold_kw: 1.0
  stop_threshold_kw: 0.5
  start_delay_min: 5
  stop_delay_min: 3

  climate_boost:
    max_degrees: 2.0
    min_surplus_w: 500

# Price data
pricing:
  source: "nordpool"
  entity: "sensor.nordpool_kwh_se3_sek_3_10_025"
  cheap_ore: 30
  expensive_ore: 80
  fallback_ore: 100

# PV Forecast
pv_forecast:
  source: "solcast"
  entity_today: "sensor.solcast_pv_forecast_forecast_today"
  entity_tomorrow: "sensor.solcast_pv_forecast_forecast_tomorrow"
  entity_pv_high_today: "input_boolean.pv_high_today"
  entity_pv_high_tomorrow: "input_boolean.pv_high_tomorrow"
  api_calls_per_day: 10
  p10_safety:
    threshold_kwh: 5.0
    confidence_pct: 20.0
    conservative_kw: 0.5
    moderate_kw: 1.0
    normal_kw: 2.0

# Weather
weather:
  source: "tempest"
  entity_pressure: "sensor.tempest_pressure"
  entity_temp: "sensor.tempest_temperature"
  entity_uv: "sensor.tempest_uv_index"
  entity_solar_radiation: "sensor.tempest_solar_radiation"

# Night planning
night_plan:
  window_start_hour: 22
  window_end_hour: 6
  house_baseload_kw: 2.5
  night_hours: 8
  appliance_margin_kwh: 3.0
  grid_charge_max_kw: 3.0
  grid_charge_price_threshold_ore: 60
  grid_charge_max_soc_pct: 90

# NightEVController (PLAT-1674) — overnight EV ramp
# User directive 2026-04-18 22:00: max_amps capped at 6 to match the
# ev_charger.max_amps invariant. Without this block the schema default
# (10) lets NightEV ramp past the user's 6 A rule.
night_ev:
  enabled: true
  night_start_hour: 22
  night_end_hour: 6
  start_amps: 6
  max_amps: 6
  min_amps: 6
  ramp_step_amps: 1
  ramp_interval_s: 60
  tak_weighted_kw: 2.7
  grid_safety_margin_up: 0.9
  grid_safety_margin_down: 0.95

# Evening planning
evening_plan:
  start_hour: 17
  end_hour: 22
  evening_allocation_pct: 50
  morning_allocation_pct: 50

# Control loop timing
control:
  # PLAT-1718: 15 s cycle so zero-grid correction hits every PV transient
  # within the ±100 W invariant. mode_change_cooldown stays at 300 s —
  # the Step 1 PREPARE no longer runs each cycle because the budget
  # emits SET_EMS_MODE idempotently (only on mode change).
  cycle_interval_s: 15
  plan_interval_s: 300
  # PLAT-1696 step 1: lowered from 300 → 60 so zero_grid can flip bat
  # between charge / discharge / standby within 1 min when grid tips.
  # GoodWe firmware accepts it — the 300 s figure was from the old
  # hourly-scenario era when mode changes were rare. With idempotent
  # SET_EMS_MODE (PLAT-1715) we only actually write when the mode
  # differs, so the cooldown protects against genuine direction changes.
  mode_change_cooldown_s: 60
  # PLAT-1696 step 1: mode-change waits shortened so bat flips
  # charge↔discharge in ~60 s total instead of ~450 s. Historical
  # defaults (60/300/60/30) were tuned for hourly scenario changes;
  # zero_grid needs sub-minute reaction time per user invariant.
  # standby_intermediate_s min is 30 in the schema (hardware settle time).
  standby_intermediate_s: 30
  mode_change_clear_wait_s: 15
  mode_change_set_wait_s: 15
  mode_change_verify_wait_s: 15
  scenario_transition_s: 300
  measurement_stale_s: 300

  deadband:
    normal_w: 100
    doubled_w: 200
    doubled_duration_s: 180

  export_target:
    rolling_avg_minutes: 15
    max_export_w: 0
    momentary_tolerance_w: 200

# Safety guards
guards:
  g0_grid_charging:
    enabled: true
    check_interval_s: 30
    action: "zero_ems_power_limit"

  g1_soc_floor:
    enabled: true
    floor_pct: 15.0
    cold_floor_pct: 20.0
    freeze_floor_pct: 25.0
    action: "battery_standby"

  g2_fast_charging_conflict:
    enabled: true
    action: "fast_charging_off"

  g3_ellevio_breach:
    enabled: true
    breach_factor: 1.05
    action: "kill_loads_max_discharge"
    recovery_hold_s: 60

  g4_temperature:
    enabled: true
    cold_temp_c: 4.0
    freeze_temp_c: 0.0
    soc_floor_raise_pct: 5.0

  g5_oscillation:
    enabled: true
    max_changes_per_window: 3
    window_s: 300
    doubled_deadband_s: 180

  g6_stale_data:
    enabled: true
    threshold_s: 300
    action: "alarm_freeze"

  g7_communication_lost:
    enabled: true
    ha_health_timeout_s: 30
    action: "alarm_freeze"

# Storage
storage:
  sqlite:
    path: "/var/lib/carma-box/carma.db"
    retention_days: 7
    vacuum_interval_hours: 24

  postgresql:
    host: "192.168.5.10"
    port: 5432
    database: "energy"
    user_env: "CARMA_PG_USER"
    password_env: "CARMA_PG_PASS"
    sync_interval_s: 300
    batch_size: 1000

# Notifications
notifications:
  slack:
    webhook_env: "CARMA_SLACK_WEBHOOK"
    channel: "#energy"
    notify_on:
      - scenario_transition
      - ev_start_stop
      - guard_trigger
      - ellevio_breach
      - communication_lost
      - daily_summary

  ha_notify:
    entity: "notify.mobile_app_bmq_iphone"
    notify_on:
      - ellevio_breach
      - communication_lost
      - guard_trigger

# Manual override
manual_override:
  # Helpers created in HA via deploy.sh (PLAT-1372)
  enabled_entity: "input_boolean.carma_manual_override"
  scenario_entity: "input_select.carma_manual_scenario"
  strategy_entity: "input_select.goodwe_battery_strategy"
  discharge_target_entity: "input_number.goodwe_total_discharge_target"
  force_replan_entity: "input_boolean.carma_force_replan"
  scenarios:
    - "Auto"
    - "MORNING_DISCHARGE"
    - "FORENOON_PV_EV"
    - "MIDDAY_CHARGE"
    - "EVENING_DISCHARGE"
    - "NIGHT_HIGH_PV"
    - "NIGHT_LOW_PV"
    - "NIGHT_GRID_CHARGE"
    - "PV_SURPLUS"

# Logging
logging:
  level: "INFO"
  file: "/var/log/carma-box/carma.log"
  max_bytes: 10485760
  backup_count: 5
  cycle_log_to_db: true
  audit_log_to_db: true
  event_log_to_db: true

# Dashboard write-back entities
dashboard:
  entity_scenario: "sensor.carma_box_scenario"
  entity_rules: "sensor.carma_box_rules"
  entity_decision_reason: "sensor.carma_box_decision_reason"
  entity_plan_today: "input_text.v6_battery_plan_today"
  entity_plan_tomorrow: "input_text.v6_battery_plan_tomorrow"
  entity_plan_day3: "input_text.v6_battery_plan_day3"

# Health check
health:
  port: 8412
  path: "/health"

# Power budget allocator tunables (PLAT-1748)
# All fields have sensible defaults — omitting this section is safe.
# bat_charge_stop_soc_pct is NOT here; it is always derived from
# control.battery_gate.charge_stop_soc_pct (PLAT-1695 invariant).
budget:
  # EV charging current limits
  ev_min_amps: 6          # absolute floor; overridden by ev_charger.ramp.start_amps in main.py
  ev_max_amps: 16         # absolute ceiling for EV budget ramp

  # Battery SoC thresholds
  bat_soc_full_pct: 100.0  # above this = bat is "full" (stops bat-discharge-support)

  # Battery spread ratios (P/S split when SoC diff is active)
  bat_lower_ratio: 0.8     # fraction of power to lower-SoC battery
  bat_higher_ratio: 0.2    # fraction of power to higher-SoC battery

  # EV ramp hold cycles (anti-oscillation)
  ev_ramp_up_hold_cycles: 2   # consecutive export cycles needed before ramping up
  ev_ramp_down_hold_cycles: 1  # consecutive import cycles before ramping down

  # Battery discharge support (allow bat to discharge to cover EV when PV insufficient)
  bat_discharge_support: true

  # Evening time boundary — battery priority after this hour
  evening_cutoff_h: 17

  # Grid-sensor tiered fine-tuner (PLAT-1737)
  # Enable once zero_grid alone is stable on the site (shadow first)
  grid_tuner:
    enabled: false
    tiers_w: [50.0, 75.0, 100.0]      # |grid| thresholds (W)
    corrections_w: [100, 300, 500]     # correction per tier (W)
    rolling_window_s: 300              # anti-flap guard window
    mode_change_stability_w: 50.0      # block mode-change if |avg| < this

  # Consumer cascade pacing
  cascade:
    cooldown_s: 60.0            # min seconds between consecutive consumer switches
    sustained_cycles: 2         # export cycles before starting next consumer
    bat_at_max_headroom_w: 500  # treat bat as saturated when alloc within this of max

  # Grid-sensor median smoothing
  smoothing:
    grid_smoothing_window: 3    # 1=no smoothing; 3=good default (rejects single spikes)

  # Battery SoC spread control
  aggressive_spread:
    bat_spread_max_pct: 1.0          # spread > this triggers P/S split
    bat_aggressive_spread_pct: 1.0   # backward-compat alias (kept = bat_spread_max_pct)

  # Emergency + capacity fallbacks
  emergency:
    bat_discharge_min_soc_pct: 15.0   # absolute floor (GoodWe cuts AC below 15%)
    bat_default_cap_kwh: 10.0         # fallback capacity when caller omits bat_caps
    bat_default_max_charge_w: 5000    # fallback max charge rate per battery
    bat_default_max_discharge_w: 5000 # fallback max discharge rate per battery
